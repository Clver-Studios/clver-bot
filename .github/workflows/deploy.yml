name: Continuous Deployment Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-ship:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx CLI
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase the Repository Owner String for Docker Compatibility
        id: string_transform
        run: |
          echo "owner_lowercase=${OWNER,,}" >> ${GITHUB_OUTPUT}
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build Production Image and Push to GitHub Packages
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string_transform.outputs.owner_lowercase }}/clevr-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  remote-deploy:
    needs: build-and-ship
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v4

      # Prepare the deployment directory in user space to avoid permission blocks
      - name: Configure Host Directories via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SERVER_SSH_KEY }}
          port: 22
          script: |
            mkdir -p ~/clevr-bot

      - name: Copy Production Compose Configuration to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SERVER_SSH_KEY }}
          port: 22
          source: "docker-compose.prod.yml"
          target: "/home/${{ secrets.PRODUCTION_SERVER_USER }}/clevr-bot/"

      - name: SSH into Production Server and Deploy Architecture
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SERVER_SSH_KEY }}
          port: 22
          # We pass the dynamic registry tokens as explicit shell environment variables
          envs: GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            cd ~/clevr-bot

            # Move and format compose config file safely
            mv docker-compose.prod.yml docker-compose.yml 2>/dev/null || true

            # Authenticate the host terminal wrapper to GHCR securely
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the fresh production container image layers
            docker compose pull

            # Spin up the infrastructure containers (DB comes up first)
            docker compose