name: Continuous Deployment Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-ship:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx CLI
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase the Repository Owner String for Docker Compatibility
        id: string_transform
        run: |
          echo "owner_lowercase=${OWNER,,}" >> ${GITHUB_OUTPUT}
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build Production Image and Push to GitHub Packages
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string_transform.outputs.owner_lowercase }}/clevr-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  remote-deploy:
    needs: build-and-ship
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v4

      - name: Copy Production Compose Configuration to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SERVER_SSH_KEY }}
          port: 22
          source: "docker-compose.prod.yml"
          target: "/opt/clevr-bot/"

      - name: SSH into Production Server and Pull Latest Infrastructure Containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /opt/clevr-bot

            # Rename the production config file to standard format on the host
            mv docker-compose.prod.yml docker-compose.yml

            # Authenticate server terminal session with GitHub Packages
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Fetch the new image layers
            docker compose pull

            # Run database push/migrations safely
            docker compose run --rm bot pnpm prisma db push

            # Boot up the updated services
            docker compose up -d --remove-orphans
